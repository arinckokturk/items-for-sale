<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items for Sale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1814;
    --muted: #7a756c;
    --accent: #2a2520;
    --green: #3a6b4a;
    --green-bg: #edf4ef;
    --red: #8b3a3a;
    --red-bg: #f7eded;
    --orange: #8b5e2a;
    --orange-bg: #fdf3e7;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: #f7f5f0;
    padding: 3rem 2rem 2.5rem;
    text-align: center;
  }

  header h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.6;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Filters ── */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 1.5rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 18px;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #f7f5f0;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  .card.sold { opacity: 0.55; }
  .card.sold:hover { transform: none; box-shadow: none; }

  /* ── Gallery ── */
  .gallery {
    position: relative;
    height: 220px;
    background: var(--bg);
    overflow: hidden;
  }

  .gallery img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 0.35s;
  }

  .gallery img.portrait {
    object-fit: contain;
    background: var(--bg);
  }

  .gallery img.active { opacity: 1; }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.85);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: background 0.15s;
    z-index: 2;
  }

  .gallery-nav:hover { background: white; }
  .gallery-nav.prev { left: 10px; }
  .gallery-nav.next { right: 10px; }

  .gallery-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.2s;
  }

  .dot.active { background: white; }

  /* ── Card body ── */
  .card-body {
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-available { background: var(--green-bg); color: var(--green); }
  .badge-sold { background: var(--red-bg); color: var(--red); }
  .badge-reserved { background: var(--orange-bg); color: var(--orange); }

  .product-id {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: monospace;
    letter-spacing: 0.05em;
  }

  .desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.65;
    flex: 1;
    white-space: pre-line;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .price {
    font-family: var(--serif);
    font-size: 1.4rem;
    color: var(--text);
  }

  /* ── Empty state ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 2.5rem 1rem;
    text-align: center;
    margin-top: 1rem;
  }

  footer p {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  footer a {
    font-family: var(--serif);
    font-size: 1.2rem;
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: border-color 0.2s;
  }

  footer a:hover { border-color: var(--text); }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 4px;
  }

  #lightbox-close {
    position: fixed;
    top: 1.2rem;
    right: 1.4rem;
    background: white;
    border: none;
    color: #1a1814;
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  #lightbox-close:hover { opacity: 1; }

  #lightbox-prev, #lightbox-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: white;
    border: none;
    color: #1a1814;
    font-size: 2.5rem;
    line-height: 1;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
  #lightbox-prev { left: 1rem; }
  #lightbox-next { right: 1rem; }

  .gallery { cursor: zoom-in; }
</style>
</head>
<body>

<header>
  <h1>Items for Sale</h1>
  <p>Second-hand &middot; Good condition &middot; Amsterdam</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all', event)">All</button>
  <button class="filter-btn" onclick="filterProducts('available', event)">Available</button>
  <button class="filter-btn" onclick="filterProducts('reserved', event)">Reserved</button>
  <button class="filter-btn" onclick="filterProducts('sold', event)">Sold</button>
</div>

<main class="grid" id="grid"></main>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <button id="lightbox-prev" onclick="shiftLightbox(-1)">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="shiftLightbox(1)">&#8250;</button>
</div>

<footer>
  <p>Interested in an item? Get in touch</p>
  <a href="mailto:arinckokturk@gmail.com">arinckokturk@gmail.com</a>
  <br>
  <a href="mailto:zulalates@gmail.com">zulalates@gmail.com</a>
</footer>

<script>
// ─────────────────────────────────────────
//  PRODUCTS — edit this list to add/update
// ─────────────────────────────────────────
const products = [
  {
    id: "PRD-001",
    title: "IKEA TROTTEN - Desk sit/stand adjustable",
    description: "In good condition\nColor: Beige/white\nSize: 160×80 cm",
    price: "€120",
    status: "reserved",
    photos: [
      "photos/PRD-001/IMG_5830 Large.jpeg",
      "photos/PRD-001/IMG_5831 Large.jpeg",
      "photos/PRD-001/IMG_5833 Large.jpeg",
      "photos/PRD-001/IMG_5834 Large.jpeg",
      "photos/PRD-001/IMG_5835 Large.jpeg"
    ]
  },
  {
    id: "PRD-002",
    title: "IKEA MILLBERGET - Chair",
    description: "In good condition\nAdjustable\nColor: Murum black",
    price: "€60",
    status: "available",
    photos: [
      "photos/PRD-002/IMG_5836 Large.jpeg",
      "photos/PRD-002/IMG_5837 Large.jpeg",
      "photos/PRD-002/IMG_5838 Large.jpeg",
      "photos/PRD-002/IMG_5839 Large.jpeg"
    ]
  }
];

// ─────────────────────────────────────────
//  Rendering logic — no need to edit below
// ─────────────────────────────────────────
let currentFilter = 'all';
const galleryState = {};

function buildCard(p) {
  const isSold = p.status === 'sold';
  const imgs = p.photos.map((src, i) =>
    `<img src="${src}" class="${i === 0 ? 'active' : ''}" alt="${p.title}" loading="lazy">`
  ).join('');
  const navs = p.photos.length > 1
    ? `<button class="gallery-nav prev" onclick="shiftPhoto('${p.id}',-1)">&#8249;</button>
       <button class="gallery-nav next" onclick="shiftPhoto('${p.id}',1)">&#8250;</button>`
    : '';
  const dots = p.photos.length > 1
    ? `<div class="gallery-dots">${p.photos.map((_, i) =>
        `<button class="dot ${i === 0 ? 'active' : ''}" onclick="goPhoto('${p.id}',${i})"></button>`
      ).join('')}</div>`
    : '';

  return `
  <article class="card ${isSold ? 'sold' : ''}">
    <div class="gallery" id="gal-${p.id}">
      ${imgs}${navs}${dots}
    </div>
    <div class="card-body">
      <div class="card-top">
        <h2 class="card-title">${p.title}</h2>
        <span class="badge badge-${p.status}">${p.status.charAt(0).toUpperCase() + p.status.slice(1)}</span>
      </div>
      <span class="product-id">${p.id}</span>
      <p class="desc">${p.description}</p>
      <div class="card-footer">
        <span class="price">${p.price}</span>
      </div>
    </div>
  </article>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === 'all'
    ? products
    : products.filter(p => p.status === currentFilter);
  grid.innerHTML = filtered.length
    ? [...filtered].reverse().map(buildCard).join('')
    : '<p class="empty">No items in this category.</p>';

  grid.querySelectorAll('.gallery').forEach(gallery => {
    gallery.style.cursor = 'zoom-in';
    gallery.addEventListener('click', e => {
      if (e.target.closest('.gallery-nav')) return;
      const activeImg = gallery.querySelector('img.active') || gallery.querySelector('img');
      if (activeImg) openLightbox(activeImg);
    });
  });

  grid.querySelectorAll('.gallery img').forEach(img => {
    const apply = () => {
      if (img.naturalHeight > img.naturalWidth) img.classList.add('portrait');
      else img.classList.remove('portrait');
    };
    if (img.complete) apply();
    else img.addEventListener('load', apply);

  });
}

function filterProducts(f, e) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderGrid();
}

function getImgs(id) { return document.querySelectorAll(`#gal-${id} img`); }
function getDots(id) { return document.querySelectorAll(`#gal-${id} .dot`); }

function goPhoto(id, idx) {
  getImgs(id).forEach(i => i.classList.remove('active'));
  getDots(id).forEach(d => d.classList.remove('active'));
  const imgs = getImgs(id), dots = getDots(id);
  if (imgs[idx]) imgs[idx].classList.add('active');
  if (dots[idx]) dots[idx].classList.add('active');
  galleryState[id] = idx;
}

function shiftPhoto(id, dir) {
  const imgs = getImgs(id);
  const next = ((galleryState[id] || 0) + dir + imgs.length) % imgs.length;
  goPhoto(id, next);
}

// ── Lightbox ──
let lbPhotos = [], lbIndex = 0;

function openLightbox(img) {
  const gallery = img.closest('.gallery');
  const allImgs = [...gallery.querySelectorAll('img')];
  lbPhotos = allImgs.map(i => i.src);
  lbIndex = allImgs.indexOf(img);
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function shiftLightbox(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = lbPhotos[lbIndex];
  document.getElementById('lightbox-prev').style.display = lbPhotos.length > 1 ? '' : 'none';
  document.getElementById('lightbox-next').style.display = lbPhotos.length > 1 ? '' : 'none';
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') shiftLightbox(-1);
  if (e.key === 'ArrowRight') shiftLightbox(1);
});

renderGrid();
</script>
</body>
</html>
